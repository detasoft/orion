bootstrap:
  baseDir: orion_root
  workDir: work
  threadPoolSize: 10
  accessControl:
    location: local:orion
    branch: master
    paths:
      - orion.xml
    createDefaultIfMissing: true
storage:
  location: repos
  createOnPush: true
transport:
  defaultAddress: localhost
  git:
    port: 9418
    enabled: false
  http:
    port: 8000
  https:
    port: 8443
    acme:
      enabled: false
      directoryUrl: acme://letsencrypt.org/staging
      accountKeyPath: acme/account.keypair
      domainKeyPath: acme/domain.keypair
      certificatePath: acme/nginx.pem
  ssh:
    port: 8022
