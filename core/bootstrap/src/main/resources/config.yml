bootstrap:
  baseDir: target/orion_root
  workDir: work
  threadPoolSize: 10
  accessControl:
    location: local:orion
    branch: master
    paths:
      - orion.xml
    createDefaultIfMissing: true
storage:
  location: file:target/orion_root/repos
  createOnPush: true
transport:
  defaultAddress: localhost
  git:
    port: 9418
    enabled: false
  http:
    port: 8000
  https:
    port: 8443
  ssh:
    port: 8022
