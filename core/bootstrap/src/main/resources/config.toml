[bootstrap]
baseDir = "orion_root"
workDir = "work"
threadPoolSize = 10

[bootstrap.accessControl]
location = "local:orion"
branch = "master"
paths = ["orion.xml"]
createDefaultIfMissing = true

[storage]
location = "repos"
createOnPush = true

[transport]
defaultAddress = "localhost"

[transport.git]
port = 9418
enabled = false

[transport.http]
port = 8000

[transport.https]
port = 8443

[transport.https.acme]
enabled = false
directoryUrl = "acme://letsencrypt.org/staging"
accountKeyPath = "acme/account.keypair"
domainKeyPath = "acme/domain.keypair"
certificatePath = "acme/nginx.pem"

[transport.ssh]
port = 8022
