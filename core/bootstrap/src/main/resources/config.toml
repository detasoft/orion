[bootstrap]
baseDir = "target/orion_root"
workDir = "work"
threadPoolSize = 10

[bootstrap.accessControl]
location = "local:orion"
branch = "master"
paths = ["orion.xml"]
createDefaultIfMissing = true

[storage]
location = "file:target/orion_root/repos"
createOnPush = true

[transport]
defaultAddress = "localhost"

[transport.git]
port = 9418
enabled = false

[transport.http]
port = 8000

[transport.https]
port = 8443

[transport.ssh]
port = 8022
